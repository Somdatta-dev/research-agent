services:
  web:
    ports:
      - "49731:80"

  api:
    environment:
      APP_ENV: development
      LOG_LEVEL: DEBUG
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  postgres:
    ports:
      - "54821:5432"

  redis:
    ports:
      - "63791:6379"
